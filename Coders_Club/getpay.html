<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no" />
  <title>Checkout – Java Mastery Course (GetPay Test)</title>

  <script defer src="https://minio.finpos.global/getpay-cdn/webcheckout/v5/bundle.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root { --primary: #5662FF; --primary-dark: #3e4dcc; --text: #1a1a2e; --light: #f8f9ff; --gray: #94a3b8; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', Arial, sans-serif; background: linear-gradient(135deg, #f5f7ff 0%, #e6e9ff 100%); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: white; max-width: 480px; width: 100%; border: 1px solid #e2e8f0; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(86, 98, 255, 0.15); }
    .header { background: linear-gradient(135deg, var(--primary), #7b85ff); color: white; padding: 30px 20px; text-align: center; }
    .header h1 { font-size: 28px; margin-bottom: 8px; font-weight: 700; }
    .header p { opacity: 0.9; font-size: 16px; }
    .content { padding: 30px; }
    .course-card { display: flex; align-items: center; background: #f8f9ff; border-radius: 12px; padding: 16px; margin-bottom: 25px; border: 1px solid #e6eaff; }
    .course-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; margin-right: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .course-info h3 { font-size: 18px; margin-bottom: 6px; color: var(--text); }
    .price { font-size: 24px; font-weight: 700; color: var(--primary); }
    .btn-pay { width: 100%; padding: 16px; font-size: 18px; font-weight: 600; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; display:flex; gap:10px; align-items:center; justify-content:center; }
    .btn-pay:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(86,98,255,0.3); }
    .btn-pay:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
    .secure-note { text-align:center; margin-top:20px; font-size:14px; color:var(--gray); }
    .secure-note i { color:#10b981; margin-right:6px; }
    #integration-status { padding: 12px 20px; font-size:13px; color:#374151; text-align:center; }
    #integration-status.err { color:#b91c1c; }
    #integration-status.warn { color:#b45309; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Java Mastery Course</h1>
      <p>Learn Java from scratch to advanced level</p>
    </div>

    <div class="content">
      <div class="course-card">
        <img src="https://sandeepkumarjha.com.np/img/java.png" alt="Java Course">
        <div class="course-info">
          <h3>JAVA FULL COURSE</h3>
          <div class="price">Rs 4,500.55</div>
        </div>
      </div>

      <div id="checkout" hidden></div>

      <button id="checkout-btn" class="btn-pay">
        <i class="fas fa-lock"></i>
        <span id="btn-text">Proceed to Pay Securely</span>
      </button>

      <p class="secure-note">
        <i class="fas fa-shield-alt"></i>
        Secured by NCHL GetPay • 256-bit SSL Encryption
      </p>

      <div id="integration-status">Waiting for checkout…</div>
    </div>
  </div>

  <script>
    const PAP_INFO = "eyJpbnN0aXR1dGlvbklkIjoiMTIyIiwibWlkIjoiMTIzMTIzNDUxNzcwOTg2IiwidGlkIjoiMTIzNTg3NjIifQ==";
    const OPR_KEY = "4fa4c6b9-3f91-43e5-9b4f-319f68187ba5";
    const INS_KEY = ""; 
    const BASE_URL = "https://uat-bank-getpay.nchl.com.np/ecom-web-checkout/v1/secure-merchant/transactions";
    const WEBSITE_DOMAIN = "https://sandeepkumarjha.com.np";

    const statusEl = document.getElementById('integration-status');
    const btn = document.getElementById('checkout-btn');
    const btnText = document.getElementById('btn-text');

    function setStatus(text, cls = '') {
      statusEl.textContent = text;
      statusEl.className = cls;
    }

    // Check availability on load
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (typeof window.GetPay === 'undefined') {
          setStatus('Warning: GetPay bundle not detected. Check internet or AdBlock.', 'warn');
        } else {
          setStatus('Ready to checkout.');
        }
      }, 500);
    });

    btn.onclick = function (e) {
      e.preventDefault();
      
      if (typeof window.GetPay === 'undefined') {
        alert('GetPay SDK not loaded.');
        return;
      }

      btn.disabled = true;
      btnText.innerText = 'Initializing…';

      const options = {
        userInfo: {
          name: "Sandeep Kumar Jha",
          email: "zhasandeep7@gmail.com",
          state: "Bagmati",
          country: "Nepal",
          zipcode: "44600",
          city: "Kathmandu",
          address: "Maitidevi"
        },
        clientRequestId: "ORDER-" + Date.now(),
        papInfo: PAP_INFO,
        oprKey: OPR_KEY,
        insKey: INS_KEY,
        websiteDomain: WEBSITE_DOMAIN,
        price: 4500.55,
        businessName: "Sandeep Store",
        imageUrl: "https://sandeepkumarjha.com.np/img/java.png",
        currency: "NPR",
        prefill: { name: true, email: true, state: true, city: true, address: true },
        themeColor: "#5662FF",
        baseUrl: BASE_URL,
        callbackUrl: {
          successUrl: WEBSITE_DOMAIN + "/payment.html",
          failUrl: WEBSITE_DOMAIN + "/fail.html"
        },
        onSuccess: function (response) {
          console.log('Success:', response);
          window.location.href = WEBSITE_DOMAIN + "/payment.html";
        },
        onError: function (error) {
          console.error('Error:', error);
          alert('Payment Failed.');
          btn.disabled = false;
          btnText.innerText = 'Proceed to Pay Securely';
        }
      };

      try {
        const getpay = new GetPay(options);
        if (typeof getpay.initialize === 'function') {
          getpay.initialize();
        } else if (typeof getpay.init === 'function') {
          getpay.init();
        }
        setStatus('Checkout opened.');
      } catch (err) {
        console.error('Init Error:', err);
        btn.disabled = false;
        btnText.innerText = 'Proceed to Pay Securely';
      }
    };
  </script>
</body>
</html>
