server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Root directory pointing to the Next.js build or monorepo workspace root
    root /var/www/portfolio_website;

    # Nginx configuration for Next.js app running on localhost:3000
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Bypassing the Next.js router completely for /projects/codersclub/*
    # Serving it directly from the public/projects/codersclub/ directory
    location /projects/codersclub/ {
        # Point directly to the standalone application codebase subdirectory
        alias /var/www/portfolio_website/public/projects/codersclub/;
        index index.html;
        try_files $uri $uri/ /projects/codersclub/index.html;
    }
}
