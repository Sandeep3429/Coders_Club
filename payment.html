<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Checkout | getPay</title>

  <!-- Prevent framing -->
  <script>
    if (window.top !== window.self) {
      window.top.location = window.self.location.href;
    }
  </script>

  <script defer src="https://minio.finpos.global/getpay-cdn/webcheckout/v5/bundle.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f7ff;
      margin: 0;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .payment-wrapper {
      width: 100%;
      max-width: 560px;          /* slightly wider → feels less tight */
      background: #ffffff;
      padding: 28px 24px;        /* better breathing room */
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.09);
      margin: 20px auto;
    }

    h1, h2 {
      margin: 0 0 0.8em;
      text-align: center;
      color: #1a1a2e;
    }

    /* Checkout container – responsive height handling */
    .checkout-container {
      width: 100%;
      min-height: 480px;          /* fallback minimum height */
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #fafafa;
      border: 1px solid #e0e4f0;
    }

    #checkout {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      inset: 0;
    }

    /* Loader styling */
    .loader-wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.92);
      z-index: 10;
    }

    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #5662FF;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error-message {
      color: #e63946;
      margin-top: 24px;
      padding: 14px 18px;
      background: #ffebee;
      border: 1px solid #ffcdd2;
      border-radius: 10px;
      text-align: center;
      font-size: 0.95rem;
    }

    /* Small screens adjustments */
    @media (max-width: 480px) {
      .payment-wrapper {
        padding: 20px 16px;
        border-radius: 12px;
      }
      .checkout-container {
        min-height: 520px;   /* give a bit more room on small screens */
      }
    }
  </style>
</head>
<body>

<div class="payment-wrapper">

  <div id="status-message" class="loader-wrapper" style="display: none;">
    <div class="loader"></div>
    <h2>Processing Payment</h2>
    <p>Please wait while we verify your transaction…</p>
  </div>

  <div class="checkout-container">
    <div id="checkout"></div>
  </div>

  <div id="error-display" class="error-message"></div>

</div>

<script>
// ──────────────────────────────────────────────
// CONFIG
// ──────────────────────────────────────────────
const PAP_INFO       = "eyJpbnN0aXR1dGlvbklkIjoiMTIyIiwibWlkIjoiMTIzMTIzNDUxNzcwOTg2IiwidGlkIjoiMTIzNTg3NjIifQ==";
const OPR_KEY        = "4fa4c6b9-3f91-43e5-9b4f-319f68187ba5";
const VERIFY_URL     = "https://uat-bank-getpay.nchl.com.np/ecom-web-checkout/v1/secure-merchant/transactions/merchant-status";
const WEBSITE_DOMAIN = "https://sandeepkumarjha.com.np";
const EXPECTED_AMOUNT = 4500.55;

// ──────────────────────────────────────────────
// ERROR HANDLER
// ──────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById("error-display");
  el.innerText = msg;
  el.style.display = "block";

  document.getElementById("checkout").style.display = "none";
  document.getElementById("status-message").style.display = "none";
}

// ──────────────────────────────────────────────
// VERIFY & REDIRECT
// ──────────────────────────────────────────────
async function verifyAndRedirect(txnId) {
  document.getElementById("checkout").style.display = "none";
  document.getElementById("status-message").style.display = "flex";

  try {
    const res = await fetch(VERIFY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: txnId })
    });

    if (!res.ok) throw new Error("HTTP " + res.status);

    const result = await res.json();
    const data = result.data || result;

    if (!data || data.status !== "SUCCESS") {
      const reason = data?.remarks || "Transaction failed";
      window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=${encodeURIComponent(reason)}`;
      return;
    }

    const received = Number(data.amount);
    if (Math.abs(received - EXPECTED_AMOUNT) > 0.01) {
      window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=amount`;
      return;
    }

    window.location.href = `${WEBSITE_DOMAIN}/success.html?verified=true&txid=${txnId}`;
  } catch (err) {
    console.error(err);
    window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=verification`;
  }
}

// ──────────────────────────────────────────────
// MAIN
// ──────────────────────────────────────────────
window.addEventListener("load", () => {
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  // RETURN FROM BANK
  if (token) {
    try {
      const payload = JSON.parse(atob(token));
      const txnId = payload.id || payload.transactionId || payload.txnId;
      if (txnId) {
        verifyAndRedirect(txnId);
        return;
      }
    } catch (e) {
      showError("Invalid response from bank");
      return;
    }
  }

  // INITIALIZE SDK
  function init() {
    if (typeof GetPay === "undefined") {
      setTimeout(init, 400);
      return;
    }

    const options = {
      userInfo: {
        name:    "Sandeep Kumar Jha",
        email:   "zhasandeep7@gmail.com",
        city:    "Kathmandu",
        address: "Maitidevi"
      },
      clientRequestId: "ORD-" + Date.now(),
      papInfo: PAP_INFO,
      oprKey: OPR_KEY,
      insKey: "",
      websiteDomain: WEBSITE_DOMAIN,
      price: EXPECTED_AMOUNT,
      currency: "NPR",
      baseUrl: "https://uat-bank-getpay.nchl.com.np/ecom-web-checkout/v1/secure-merchant/transactions",

      onSuccess: (res) => {
        const tid = res.transactionId || res.id || res.txnId;
        if (tid) {
          verifyAndRedirect(tid);
        } else {
          showError("Transaction ID missing");
        }
      },

      onError: (err) => {
        console.warn(err);
        showError("Payment failed. Please try again.");
      }
    };

    try {
      const gp = new GetPay(options);
      (gp.initialize || gp.init || gp.start)?.();
    } catch (e) {
      showError("Payment initialization failed");
    }
  }

  init();
});
</script>

</body>
</html>
