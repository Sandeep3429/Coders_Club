<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | GetPay</title>
    
    <script>
        // Iframe Buster
        if (window.top !== window.self) {
            window.top.location = window.self.location.href;
        }
    </script>

    <script defer src="https://minio.finpos.global/getpay-cdn/webcheckout/v5/bundle.js"></script>

    <style>
        :root {
            --primary: #5662FF;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .payment-wrapper {
            width: 100%;
            max-width: 480px; /* Narrower for a more "compact/intact" look */
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }

        .checkout-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .checkout-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .checkout-header p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Container for the SDK Iframe */
        #checkout {
            width: 100%;
            min-height: 520px; /* Height adjusted for the Flex Form */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Status & Loading States */
        #status-message {
            text-align: center;
            padding: 40px 0;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            color: #ef4444;
            margin-top: 20px;
            padding: 1rem;
            background: #fef2f2;
            border-radius: 12px;
            border: 1px solid #fee2e2;
            font-size: 0.875rem;
            display: none;
            text-align: center;
        }

        /* Responsive Tweaks */
        @media (max-width: 480px) {
            .payment-wrapper {
                padding: 24px;
                box-shadow: none;
                background: transparent;
            }
        }
    </style>
</head>
<body>

    <div class="payment-wrapper">
        <div class="checkout-header" id="header-ui">
            <h1>Secure Checkout</h1>
            <p>Pay with NCHL ConnectIPS or Card</p>
        </div>

        <div id="status-message" style="display:none;">
            <div class="loader"></div>
            <h2 style="font-size: 1.1rem; margin-bottom: 10px;">Verifying Payment</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Please do not close this window...</p>
        </div>

        <div id="checkout">
            <div class="loader"></div>
            <p style="text-align:center; font-size: 0.85rem; color: var(--text-muted);">Securely loading form...</p>
        </div>

        <div id="error-display" class="error-message"></div>
    </div>

    <script>
        /* CONFIG */
        const PAP_INFO = "eyJpbnN0aXR1dGlvbklkIjoiMTIyIiwibWlkIjoiMTIzMTIzNDUxNzcwOTg2IiwidGlkIjoiMTIzNTg3NjIifQ==";
        const OPR_KEY = "4fa4c6b9-3f91-43e5-9b4f-319f68187ba5";
        const VERIFY_URL = "https://uat-bank-getpay.nchl.com.np/ecom-web-checkout/v1/secure-merchant/transactions/merchant-status";
        const WEBSITE_DOMAIN = "https://sandeepkumarjha.com.np";
        const EXPECTED_AMOUNT = 4500.55;

        /* ERROR HANDLER */
        function showError(msg) {
            const el = document.getElementById("error-display");
            el.innerText = msg;
            el.style.display = "block";
            document.getElementById("checkout").style.display = "none";
            document.getElementById("status-message").style.display = "none";
            document.getElementById("header-ui").style.display = "none";
        }

        /* VERIFICATION LOGIC */
        async function verifyAndRedirect(txnId) {
            document.getElementById("checkout").style.display = "none";
            document.getElementById("header-ui").style.display = "none";
            document.getElementById("status-message").style.display = "block";

            try {
                const res = await fetch(VERIFY_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id: txnId })
                });

                if (!res.ok) throw new Error("HTTP " + res.status);

                const result = await res.json();
                const data = result.data || result;

                if (!data || data.status !== "SUCCESS") {
                    const reason = data?.remarks || "Transaction failed";
                    window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=${encodeURIComponent(reason)}`;
                    return;
                }

                // Amount check
                if (Math.abs(Number(data.amount) - EXPECTED_AMOUNT) > 0.01) {
                    window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=amount_mismatch`;
                    return;
                }

                window.location.href = `${WEBSITE_DOMAIN}/success.html?verified=true&txid=${txnId}`;
            } catch (err) {
                console.error(err);
                window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=verification_error`;
            }
        }

        /* INITIALIZATION */
        window.addEventListener("load", () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get("token");

            // Handle Bank Return
            if (token) {
                try {
                    const payload = JSON.parse(atob(token));
                    const txnId = payload.id || payload.transactionId;
                    if (txnId) {
                        verifyAndRedirect(txnId);
                        return;
                    }
                } catch (e) {
                    showError("Could not process bank response.");
                    return;
                }
            }

            // Normal Initialization
            function initSDK() {
                if (typeof GetPay === "undefined") {
                    setTimeout(initSDK, 300);
                    return;
                }

                const options = {
                    userInfo: {
                        name: "Sandeep Kumar Jha",
                        email: "zhasandeep7@gmail.com",
                        city: "Kathmandu",
                        address: "Maitidevi"
                    },
                    clientRequestId: "ORD-" + Date.now(),
                    papInfo: PAP_INFO,
                    oprKey: OPR_KEY,
                    insKey: "",
                    websiteDomain: WEBSITE_DOMAIN,
                    price: EXPECTED_AMOUNT,
                    currency: "NPR",
                    baseUrl: "https://uat-bank-getpay.nchl.com.np/ecom-web-checkout/v1/secure-merchant/transactions",
                    onSuccess: (res) => {
                        const tid = res.transactionId || res.id;
                        tid ? verifyAndRedirect(tid) : showError("Transaction ID missing");
                    },
                    onError: (err) => {
                        console.warn(err);
                        showError("The payment process was interrupted. Please try again.");
                    }
                };

                try {
                    const gp = new GetPay(options);
                    // Clear loading text inside checkout before init
                    document.getElementById('checkout').innerHTML = '';
                    (gp.initialize || gp.init || gp.start)?.();
                } catch (e) {
                    showError("Initialization failed. Please refresh.");
                }
            }

            initSDK();
        });
    </script>
</body>
</html>
