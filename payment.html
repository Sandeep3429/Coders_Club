<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifying Payment | getPay</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.05);
      border-top: 4px solid #5662ff;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
    }
    p {
      color: #94a3b8;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <h2>Verifying Payment</h2>
  <p>Please wait while we confirm your transaction status with the bank...</p>

  <script>
    const VERIFY_URL = "https://uat-bank-getpay.nchl.com.np/ecom-web-checkout/v1/secure-merchant/transactions/merchant-status";
    const WEBSITE_DOMAIN = "https://sandeepkumarjha.com.np";

    async function verifyAndRedirect(txnId, expectedAmount) {
      try {
        const res = await fetch(VERIFY_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: txnId }),
        });

        if (!res.ok) throw new Error("HTTP " + res.status);

        const result = await res.json();
        const data = result.data || result;

        if (!data || data.status !== "SUCCESS") {
          const reason = data?.remarks || "Transaction failed";
          window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=${encodeURIComponent(reason)}`;
          return;
        }

        const received = Number(data.amount);
        if (Math.abs(received - expectedAmount) > 0.05) {
          window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=amount_mismatch`;
          return;
        }

        window.location.href = `${WEBSITE_DOMAIN}/success.html?verified=true&txid=${txnId}`;
      } catch (err) {
        console.error(err);
        window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=verification_error`;
      }
    }

    window.addEventListener("load", () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const expectedAmount = Number(localStorage.getItem("getpay_expected_amount")) || 6500.00;

      if (token) {
        try {
          const payload = JSON.parse(atob(token));
          const txnId = payload.id || payload.transactionId || payload.txnId;
          if (txnId) {
            verifyAndRedirect(txnId, expectedAmount);
            return;
          }
        } catch (e) {
          window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=invalid_token`;
          return;
        }
      } else {
        window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=missing_token`;
      }
    });
  </script>
</body>
</html>
