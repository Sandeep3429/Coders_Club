<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Checkout | getPay</title>

  <!-- Break out of any unwanted frames -->
  <script>
    if (window.top !== window.self) {
      window.top.location = window.self.location.href;
    }
  </script>

  <script defer src="https://minio.finpos.global/getpay-cdn/webcheckout/v5/bundle.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f4f7ff 0%, #e0e7ff 100%);
      margin: 0;
      padding: 16px 12px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .payment-wrapper {
      width: 100%;
      max-width: 580px;               /* A bit wider → less cramped */
      background: #ffffff;
      padding: 32px 24px;
      border-radius: 20px;
      box-shadow: 0 12px 50px rgba(0,0,0,0.10);
      margin: 24px auto;
    }

    h2 {
      margin: 0 0 1em;
      text-align: center;
      color: #1e293b;
      font-size: 1.5rem;
    }

    /* Key fix: generous min-height + allow growth */
    .checkout-container {
      width: 100%;
      min-height: 680px;              /* ← increased → most payment forms need 650–850px */
      height: auto;                   /* let content expand if needed */
      border-radius: 14px;
      overflow: hidden;
      background: #f9fafb;
      border: 1px solid #e2e8f0;
      position: relative;
    }

    #checkout {
      width: 100%;
      min-height: 100%;
      border: none;
    }

    /* Loader overlay */
    .loader-wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.96);
      z-index: 20;
      gap: 16px;
    }

    .loader {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #5662FF;
      border-radius: 50%;
      width: 52px;
      height: 52px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      margin-top: 24px;
      padding: 16px;
      background: #fee2e2;
      color: #dc2626;
      border-radius: 12px;
      text-align: center;
      font-weight: 500;
      border: 1px solid #fecaca;
    }

    @media (max-width: 500px) {
      .payment-wrapper {
        padding: 24px 18px;
        border-radius: 16px;
      }
      .checkout-container {
        min-height: 720px;           /* even taller on small screens if needed */
      }
    }
  </style>
</head>
<body>

<div class="payment-wrapper">

  <!-- Shown during verification -->
  <div id="status-message" class="loader-wrapper" style="display: none;">
    <div class="loader"></div>
    <h2>Processing Payment</h2>
    <p>Please wait while we verify your transaction…</p>
  </div>

  <!-- Where SDK injects the form / iframe -->
  <div class="checkout-container">
    <div id="checkout"></div>
  </div>

  <!-- Error display -->
  <div id="error-display" class="error-message" style="display:none;"></div>

</div>

<script>
// ──────────────────────────────────────────────
// CONFIG (unchanged)
const PAP_INFO       = "eyJpbnN0aXR1dGlvbklkIjoiMTIyIiwibWlkIjoiMTIzMTIzNDUxNzcwOTg2IiwidGlkIjoiMTIzNTg3NjIifQ==";
const OPR_KEY        = "4fa4c6b9-3f91-43e5-9b4f-319f68187ba5";
const VERIFY_URL     = "https://uat-bank-getpay.nchl.com.np/ecom-web-checkout/v1/secure-merchant/transactions/merchant-status";
const WEBSITE_DOMAIN = "https://sandeepkumarjha.com.np";
const EXPECTED_AMOUNT = 4500.55;

// ──────────────────────────────────────────────
// ERROR
function showError(msg) {
  document.getElementById("error-display").innerText = msg;
  document.getElementById("error-display").style.display = "block";
  document.getElementById("checkout").style.display = "none";
  document.getElementById("status-message").style.display = "none";
}

// ──────────────────────────────────────────────
// VERIFY
async function verifyAndRedirect(txnId) {
  document.getElementById("checkout").style.display = "none";
  document.getElementById("status-message").style.display = "flex";

  try {
    const res = await fetch(VERIFY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: txnId })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const result = await res.json();
    const data = result.data || result;

    if (!data || data.status !== "SUCCESS") {
      const reason = data?.remarks || "Transaction failed";
      window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=${encodeURIComponent(reason)}`;
      return;
    }

    const received = Number(data.amount);
    if (Math.abs(received - EXPECTED_AMOUNT) > 0.01) {
      window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=amount_mismatch`;
      return;
    }

    window.location.href = `${WEBSITE_DOMAIN}/success.html?verified=true&txid=${txnId}`;
  } catch (err) {
    console.error(err);
    window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=verification_failed`;
  }
}

// ──────────────────────────────────────────────
// MAIN
window.addEventListener("load", () => {
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  if (token) {
    try {
      const payload = JSON.parse(atob(token));
      const txnId = payload.id || payload.transactionId || payload.txnId;
      if (txnId) {
        verifyAndRedirect(txnId);
        return;
      }
    } catch (e) {
      showError("Invalid bank response format");
      return;
    }
  }

  // Init SDK
  function init() {
    if (typeof GetPay === "undefined") {
      setTimeout(init, 300);
      return;
    }

    const options = {
      userInfo: {
        name:    "Sandeep Kumar Jha",
        email:   "zhasandeep7@gmail.com",
        city:    "Kathmandu",
        address: "Maitidevi"
      },
      clientRequestId: "ORD-" + Date.now(),
      papInfo: PAP_INFO,
      oprKey: OPR_KEY,
      insKey: "",
      websiteDomain: WEBSITE_DOMAIN,
      price: EXPECTED_AMOUNT,
      currency: "NPR",
      baseUrl: "https://uat-bank-getpay.nchl.com.np/ecom-web-checkout/v1/secure-merchant/transactions",

      onSuccess: (res) => {
        const tid = res.transactionId || res.id || res.txnId;
        if (tid) verifyAndRedirect(tid);
        else showError("No transaction ID received");
      },

      onError: (err) => {
        console.warn("Payment error:", err);
        showError("Payment could not be processed. Please try again or contact support.");
      }
    };

    try {
      const gp = new GetPay(options);
      (gp.initialize || gp.init || gp.start || gp.load)?.();
    } catch (e) {
      showError("Failed to start payment form");
      console.error(e);
    }
  }

  init();
});
</script>
</body>
</html>
