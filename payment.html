<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Payment - GetPay</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root {
      --primary: #2563eb;        /* blue for buttons */
      --primary-dark: #1d4ed8;
      --text: #1f2937;
      --gray: #6b7280;
      --light: #f3f4f6;
      --border: #d1d5db;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--light);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1rem;
      line-height: 1.5;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .header {
      background: var(--primary);
      color: white;
      padding: 1.5rem;
      text-align: center;
    }

    .header h1 {
      font-size: 1.6rem;
      margin-bottom: 0.25rem;
    }

    .header p {
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .content {
      padding: 1.75rem 1.5rem;
    }

    .section-title {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--primary);
    }

    .store-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .store-icon {
      font-size: 2rem;
      color: var(--primary);
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: #374151;
    }

    input, select {
      width: 100%;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    .card-icons {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.4rem;
    }

    .card-icons i {
      font-size: 1.6rem;
      color: #2563eb;
    }

    .card-icons .fa-cc-mastercard {
      color: #eb001b;
    }

    .expiry-cvv {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 1.5rem;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .security {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--gray);
    }

    .security i {
      color: #10b981;
      margin-right: 0.4rem;
    }

    @media (max-width: 480px) {
      body { padding: 1rem 0.8rem; }
      .content { padding: 1.5rem 1.2rem; }
      .header h1 { font-size: 1.45rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>GetPay</h1>
      <p>Secure Payment</p>
    </div>

    <div class="content">

      <div class="store-info">
        <i class="fas fa-store store-icon"></i>
        <div>
          <strong>Sandeep Kumar Jha</strong><br>
          <small>Store</small>
        </div>
      </div>

      <h2 class="section-title">Payment Method</h2>

      <div style="margin-bottom: 1.5rem;">
        <button style="padding:0.8rem 1.2rem; background:#2563eb; color:white; border:none; border-radius:6px; font-weight:500; cursor:default;">
          <i class="fas fa-credit-card" style="margin-right:0.5rem;"></i> Card
        </button>
      </div>

      <form action="#" method="post">  <!-- Change action to your backend endpoint -->

        <h2 class="section-title">Card Information</h2>

        <div class="form-group">
          <label for="cardName">Name on Card</label>
          <input type="text" id="cardName" name="cardName" value="Sandeep Kumar Jha" required placeholder="Full name on card">
        </div>

        <div class="form-group">
          <label for="cardNumber">Card Number</label>
          <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" inputmode="numeric" required>
          <div class="card-icons">
            <i class="fab fa-cc-visa"></i>
            <i class="fab fa-cc-mastercard"></i>
          </div>
        </div>

        <div class="expiry-cvv">
          <div class="form-group">
            <label for="expiry">Expiry (MM/YY)</label>
            <input type="text" id="expiry" name="expiry" placeholder="MM / YY" maxlength="5" required>
          </div>

          <div class="form-group">
            <label for="cvv">CVV</label>
            <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="4" inputmode="numeric" required>
          </div>
        </div>

        <h2 class="section-title" style="margin-top: 1.8rem;">Billing Address</h2>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" value="zhasandeep7@gmail.com" required placeholder="your@email.com">
        </div>

        <div class="form-group">
          <label for="country">Country</label>
          <select id="country" name="country" required>
            <option value="NP" selected>Nepal</option>
            <option value="IN">India</option>
            <option value="US">United States</option>
            <!-- add more if needed -->
          </select>
        </div>

        <div class="form-group">
          <label for="zip">Zip / Postal Code</label>
          <input type="text" id="zip" name="zip" placeholder="44600" required>
        </div>

        <button type="submit" class="btn">Pay Securely</button>

      </form>

      <div class="security">
        <i class="fas fa-lock"></i> Secured by GetPay • SSL Encrypted
      </div>

    </div>
  </div>

</body>
</html>
