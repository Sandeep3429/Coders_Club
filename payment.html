<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Checkout | getPay</title>

  <script>
    if (window.top !== window.self) {
      window.top.location = window.self.location.href;
    }
  </script>

  <script defer src="https://minio.finpos.global/getpay-cdn/webcheckout/v5/bundle.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f7ff;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 12px;
      min-height: 100vh;
    }

    .payment-wrapper {
      width: 100%;
      max-width: 620px;               /* balanced – not too narrow, not ultra-wide */
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.09);
      overflow: hidden;               /* helps contain any overflow */
      margin: 16px auto;
    }

    /* ── Critical change ── Let injected content breathe + grow naturally */
    #checkout {
      width: 100%;
      min-height: 720px;              /* fallback – increase to 800–1000 if still squished */
      height: auto !important;        /* fight against forced 100% height if any */
      display: block !important;
    }

    /* Loader overlay – covers whole checkout area during processing */
    #status-message {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.96);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
    }

    .loader {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #5662FF;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      margin: 24px;
      padding: 16px;
      background: #fee2e2;
      color: #dc2626;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #fecaca;
      display: none;
    }

    @media (max-width: 520px) {
      body { padding: 12px 8px; }
      .payment-wrapper {
        border-radius: 12px;
        padding: 0;                   /* remove internal padding – form has its own */
      }
      #checkout {
        min-height: 800px;            /* mobile often needs more vertical space */
      }
    }
  </style>
</head>
<body>

<div class="payment-wrapper">

  <div id="status-message">
    <div class="loader"></div>
    <h2>Processing Payment</h2>
    <p>Please wait while we verify your transaction…</p>
  </div>

  <div id="checkout"></div>

  <div id="error-display" class="error-message"></div>

</div>

<script>
// Your existing config & logic – unchanged except minor cleanups
const PAP_INFO       = "eyJpbnN0aXR1dGlvbklkIjoiMTIyIiwibWlkIjoiMTIzMTIzNDUxNzcwOTg2IiwidGlkIjoiMTIzNTg3NjIifQ==";
const OPR_KEY        = "4fa4c6b9-3f91-43e5-9b4f-319f68187ba5";
const VERIFY_URL     = "https://uat-bank-getpay.nchl.com.np/ecom-web-checkout/v1/secure-merchant/transactions/merchant-status";
const WEBSITE_DOMAIN = "https://sandeepkumarjha.com.np";
const EXPECTED_AMOUNT = 4500.55;

function showError(msg) {
  const el = document.getElementById("error-display");
  el.textContent = msg;
  el.style.display = "block";
  document.getElementById("checkout").style.display = "none";
  document.getElementById("status-message").style.display = "none";
}

async function verifyAndRedirect(txnId) {
  document.getElementById("checkout").style.display = "none";
  document.getElementById("status-message").style.display = "flex";

  try {
    const res = await fetch(VERIFY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: txnId })
    });

    if (!res.ok) throw new Error("HTTP " + res.status);

    const result = await res.json();
    const data = result.data || result;

    if (!data || data.status !== "SUCCESS") {
      const reason = data?.remarks || "Transaction failed";
      window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=${encodeURIComponent(reason)}`;
      return;
    }

    const received = Number(data.amount);
    if (Math.abs(received - EXPECTED_AMOUNT) > 0.01) {
      window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=amount`;
      return;
    }

    window.location.href = `${WEBSITE_DOMAIN}/success.html?verified=true&txid=${txnId}`;
  } catch (err) {
    console.error(err);
    window.location.href = `${WEBSITE_DOMAIN}/fail.html?reason=verification`;
  }
}

window.addEventListener("load", () => {
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  if (token) {
    try {
      const payload = JSON.parse(atob(token));
      const txnId = payload.id || payload.transactionId || payload.txnId;
      if (txnId) {
        verifyAndRedirect(txnId);
        return;
      }
    } catch (e) {
      showError("Invalid response from bank");
      return;
    }
  }

  function init() {
    if (typeof GetPay === "undefined") {
      setTimeout(init, 400);
      return;
    }

    const options = {
      userInfo: {
        name: "Sandeep Kumar Jha",
        email: "zhasandeep7@gmail.com",
        city: "Kathmandu",
        address: "Maitidevi"
      },
      clientRequestId: "ORD-" + Date.now(),
      papInfo: PAP_INFO,
      oprKey: OPR_KEY,
      insKey: "",
      websiteDomain: WEBSITE_DOMAIN,
      price: EXPECTED_AMOUNT,
      currency: "NPR",
      baseUrl: "https://uat-bank-getpay.nchl.com.np/ecom-web-checkout/v1/secure-merchant/transactions",
      onSuccess: (res) => {
        const tid = res.transactionId || res.id || res.txnId;
        if (tid) {
          verifyAndRedirect(tid);
        } else {
          showError("Transaction ID missing");
        }
      },
      onError: (err) => {
        console.warn(err);
        showError("Payment failed. Please try again.");
      }
    };

    try {
      const gp = new GetPay(options);
      (gp.initialize || gp.init || gp.start)?.();
    } catch (e) {
      showError("Payment initialization failed");
    }
  }

  init();
});
</script>

</body>
</html>
