<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Secure Checkout | GetPay</title>

<script>
if (window.top !== window.self) {
window.top.location = window.self.location.href;
}
</script>

<script defer src="https://minio.finpos.global/getpay-cdn/webcheckout/v5/bundle.js"></script>

<style>

:root{
--primary:#6366f1;
--bg:#f8fafc;
--surface:#ffffff;
--text:#0f172a;
--text-muted:#64748b;
--error:#ef4444;
--radius:16px;
--shadow:0 12px 34px rgba(0,0,0,.08);
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html,body{
height:100%;
font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(to bottom,#f8fafc,#e2e8f0);
}

/* CENTER VIEW */

body{

display:flex;
justify-content:center;
align-items:center;

padding:16px;

}

/* MAIN CARD */

.payment-wrapper{

width:100%;

max-width:460px;

height:auto;

background:var(--surface);

border-radius:var(--radius);

box-shadow:var(--shadow);

padding:24px;

display:flex;

flex-direction:column;

align-items:center;

}

/* HEADER */

.logo-area{

margin-bottom:18px;

}

.logo-area h1{

font-size:1.5rem;

font-weight:700;

color:var(--primary);

}

/* FIXED FORM CONTAINER */

.checkout-container{

width:100%;

max-width:420px;

height:460px;

border-radius:12px;

overflow:hidden;

display:flex;

justify-content:center;

align-items:flex-start;

}

/* GETPAY FORM TARGET */

#checkout{

width:100%;

height:460px;

min-height:460px;

}

/* STATUS */

#status-message{

display:none;

text-align:center;

padding:30px 0;

}

.loader{

border:5px solid #e2e8f0;

border-top:5px solid var(--primary);

border-radius:50%;

width:46px;

height:46px;

animation:spin 1s linear infinite;

margin:20px auto;

}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.error-message{

display:none;

margin-top:20px;

background:#fef2f2;

border:1px solid #fecaca;

padding:14px;

border-radius:10px;

font-size:.9rem;

color:var(--error);

}

/* MOBILE OPTIMIZATION */

@media(max-width:480px){

.payment-wrapper{

max-width:100%;

padding:18px;

}

.checkout-container{

height:440px;

}

#checkout{

height:440px;

}

}

</style>

</head>

<body>

<div class="payment-wrapper">

<div class="logo-area">
<h1>GetPay</h1>
</div>

<div id="status-message">

<h2>Processing Payment</h2>

<p>Please wait while we verify your transaction</p>

<div class="loader"></div>

</div>

<div class="checkout-container">

<div id="checkout"></div>

</div>

<div id="error-display" class="error-message"></div>

</div>

<script>

const PAP_INFO="eyJpbnN0aXR1dGlvbklkIjoiMTIyIiwibWlkIjoiMTIzMTIzNDUxNzcwOTg2IiwidGlkIjoiMTIzNTg3NjIifQ==";

const OPR_KEY="4fa4c6b9-3f91-43e5-9b4f-319f68187ba5";

const VERIFY_URL="https://uat-bank-getpay.nchl.com.np/ecom-web-checkout/v1/secure-merchant/transactions/merchant-status";

const WEBSITE_DOMAIN="https://sandeepkumarjha.com.np";

const EXPECTED_AMOUNT=4500.55;

function showError(msg){

const el=document.getElementById("error-display");

el.innerText=msg;

el.style.display="block";

document.getElementById("checkout").style.display="none";

document.getElementById("status-message").style.display="none";

}

async function verifyAndRedirect(txnId){

document.getElementById("checkout").style.display="none";

document.getElementById("status-message").style.display="block";

try{

const res=await fetch(VERIFY_URL,{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({id:txnId})

});

const result=await res.json();

const data=result.data||result;

if(!data || data.status!=="SUCCESS"){

window.location.href=`${WEBSITE_DOMAIN}/fail.html`;

return;

}

const received=Number(data.amount);

if(Math.abs(received-EXPECTED_AMOUNT)>0.01){

window.location.href=`${WEBSITE_DOMAIN}/fail.html?reason=amount`;

return;

}

window.location.href=`${WEBSITE_DOMAIN}/success.html?txid=${txnId}`;

}

catch(err){

window.location.href=`${WEBSITE_DOMAIN}/fail.html?reason=verify`;

}

}

window.addEventListener("load",()=>{

const params=new URLSearchParams(window.location.search);

const token=params.get("token");

if(token){

try{

const payload=JSON.parse(atob(token));

const txnId=payload.id||payload.transactionId||payload.txnId;

if(txnId){

verifyAndRedirect(txnId);

return;

}

}catch(e){

showError("Invalid bank response");

return;

}

}

function init(){

if(typeof GetPay==="undefined"){

setTimeout(init,300);

return;

}

const options={

userInfo:{

name:"Sandeep Kumar Jha",

email:"zhasandeep7@gmail.com",

city:"Kathmandu",

address:"Maitidevi"

},

clientRequestId:"ORD-"+Date.now(),

papInfo:PAP_INFO,

oprKey:OPR_KEY,

insKey:"",

websiteDomain:WEBSITE_DOMAIN,

price:EXPECTED_AMOUNT,

currency:"NPR",

baseUrl:"https://uat-bank-getpay.nchl.com.np/ecom-web-checkout/v1/secure-merchant/transactions",

onSuccess:(res)=>{

const tid=res.transactionId||res.id||res.txnId;

if(tid){

verifyAndRedirect(tid);

}else{

showError("Transaction ID missing");

}

},

onError:(err)=>{

showError("Payment failed. Please try again.");

}

};

try{

const gp=new GetPay(options);

(gp.initialize||gp.init||gp.start)?.();

}catch(e){

showError("Payment initialization failed");

}

}

setTimeout(init,400);

});

</script>

</body>
</html>
